<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>送信完了 | オルディザイン</title>
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;500;600&family=Noto+Sans+JP:wght@300;400;500&family=Noto+Serif+JP:wght@300;400;500;600&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@24,200,0,0" rel="stylesheet" />

    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        background: '#FDFCFB', 
                        accent: '#C5A865', 
                        textMain: '#1A1A1A', 
                        textSub: '#5A5A5A',
                    },
                    fontFamily: {
                        sans: ['"Noto Sans JP"', 'sans-serif'],
                        serif: ['"Noto Serif JP"', 'serif'],
                        cinzel: ['"Cinzel"', 'serif'],
                    }
                }
            }
        }
    </script>

    <style>
        body {
            background-color: #FDFCFB;
            color: #1A1A1A;
            -webkit-font-smoothing: antialiased;
            overflow: hidden; /* Canvasと中央配置のためスクロール抑制 */
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        #particle-canvas {
            position: fixed;
            top: 0; left: 0; width: 100vw; height: 100vh;
            z-index: -20;
        }

        .ambient-orb {
            position: fixed; border-radius: 50%; filter: blur(120px); opacity: 0.15; z-index: -10;
        }
        .orb-1 {
            width: 60vw; height: 60vw; background: radial-gradient(circle, #C5A865, transparent 70%);
            top: -10%; left: -10%; animation: orbFloat 25s infinite alternate ease-in-out;
        }

        @keyframes orbFloat {
            0% { transform: translate(0, 0) scale(1); }
            100% { transform: translate(5vw, 10vh) scale(1.1); }
        }

        .reveal-up {
            opacity: 0;
            transform: translateY(30px);
            animation: revealUp 1.2s cubic-bezier(0.22, 1, 0.36, 1) forwards;
        }
        @keyframes revealUp {
            to { opacity: 1; transform: translateY(0); }
        }

        .spotlight-card {
            background: linear-gradient(145deg, rgba(255,255,255,0.95) 0%, rgba(255,255,255,0.7) 100%);
            backdrop-filter: blur(24px);
            -webkit-backdrop-filter: blur(24px);
            border: 1px solid rgba(255, 255, 255, 1);
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.03), inset 0 1px 0 rgba(255,255,255,1);
            position: relative;
            overflow: hidden;
            --mouse-x: 50%;
            --mouse-y: 50%;
        }
        
        .spotlight-card::before {
            content: '';
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            background: radial-gradient(600px circle at var(--mouse-x) var(--mouse-y), rgba(197, 168, 101, 0.12), transparent 40%);
            pointer-events: none;
            z-index: 1;
        }

        .text-gradient {
            background: linear-gradient(135deg, #1A1A1A 0%, #4A4A4A 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
    </style>
</head>
<body>

    <canvas id="particle-canvas"></canvas>
    <div class="ambient-orb orb-1"></div>

    <main class="max-w-2xl w-full px-6 z-10">
        <div class="spotlight-card p-12 md:p-20 rounded-3xl text-center reveal-up">
            <div class="relative z-10">
                <div class="w-20 h-20 mx-auto bg-accent/5 rounded-full flex items-center justify-center mb-10 border border-accent/20">
                    <span class="material-symbols-outlined text-accent text-4xl">check_circle</span>
                </div>
                
                <h1 class="font-serif text-3xl md:text-4xl mb-6 tracking-wide text-gradient">
                    お問い合わせを受け付けました
                </h1>
                
                <p class="text-[15px] text-textSub font-normal leading-[2.4] mb-12">
                    この度はお問い合わせいただき、誠にありがとうございます。<br>
                    内容を確認の上、担当者より折り返しご連絡させていただきます。<br>
                    なお、内容によっては回答にお時間をいただく場合がございます。
                </p>

                <div class="pt-6">
                    <a href="index.html" class="group relative inline-flex items-center justify-center gap-6 bg-textMain text-white px-12 py-5 border border-textMain hover:bg-white hover:text-textMain shadow-lg hover:shadow-xl transition-all duration-500 rounded-sm overflow-hidden">
                        <span class="font-cinzel text-sm tracking-widest font-medium z-10">
                            BACK TO TOP
                        </span>
                        <span class="material-symbols-outlined text-lg shrink-0 z-10 group-hover:-translate-x-1 transition-transform">
                            arrow_back
                        </span>
                    </a>
                </div>
            </div>
        </div>
        
        <p class="mt-12 text-center font-cinzel text-[10px] tracking-superwide text-textSub/50 reveal-up" style="animation-delay: 0.3s;">
            &copy; 2024 ALDEXYN CORPORATION.
        </p>
    </main>

    <script>
        // 金粉のエフェクト
        const canvas = document.getElementById('particle-canvas');
        const ctx = canvas.getContext('2d');
        let particles = [];
        let w, h;
        
        function resize() {
            w = canvas.width = window.innerWidth;
            h = canvas.height = window.innerHeight;
            init();
        }
        window.addEventListener('resize', resize);

        class Particle {
            constructor() {
                this.x = Math.random() * w;
                this.y = Math.random() * h;
                this.vx = (Math.random() - 0.5) * 0.3;
                this.vy = Math.random() * -0.4 - 0.1;
                this.radius = Math.random() * 1.5 + 0.5;
                this.opacity = Math.random() * 0.4 + 0.1;
            }
            draw() {
                ctx.beginPath();
                ctx.arc(this.x, this.y, this.radius, 0, Math.PI * 2);
                ctx.fillStyle = `rgba(197, 168, 101, ${this.opacity})`;
                ctx.fill();
                ctx.shadowBlur = 8;
                ctx.shadowColor = "rgba(197, 168, 101, 0.4)";
            }
            update() {
                this.x += this.vx;
                this.y += this.vy;
                if(this.y < 0) { this.y = h; this.x = Math.random() * w; }
                this.draw();
            }
        }

        function init() {
            particles = [];
            for(let i = 0; i < (w * h) / 12000; i++) {
                particles.push(new Particle());
            }
        }

        function animate() {
            ctx.clearRect(0, 0, w, h);
            particles.forEach(p => p.update());
            requestAnimationFrame(animate);
        }

        // Spotlight effect
        const card = document.querySelector('.spotlight-card');
        window.addEventListener('mousemove', e => {
            const rect = card.getBoundingClientRect();
            const x = e.clientX - rect.left;
            const y = e.clientY - rect.top;
            card.style.setProperty('--mouse-x', `${x}px`);
            card.style.setProperty('--mouse-y', `${y}px`);
        });

        resize();
        animate();
    </script>
</body>
</html>
